<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarSclusive – Bar-Portal</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self';
                 style-src 'self' 'unsafe-inline';
                 connect-src https://script.google.com https://script.googleusercontent.com;
                 img-src 'self' data: https:;
                 frame-src 'none';
                 object-src 'none';">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000;color:#fff;min-height:100vh}
    .header{background:#111;padding:18px 24px;border-bottom:1px solid #1f1f1f;display:flex;justify-content:space-between;align-items:center}
    .logo{font-size:20px;font-weight:700}
    .btn-logout{background:#2a2a2a;border:1px solid #3a3a3a;color:#fff;padding:8px 16px;border-radius:10px;cursor:pointer;font-size:13px}
    .container{max-width:900px;margin:0 auto;padding:30px 20px}
    .tabs{display:flex;gap:0;border-bottom:1px solid #222;margin-bottom:30px}
    .tab{padding:12px 22px;cursor:pointer;font-size:14px;font-weight:500;color:#888;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
    .tab.active{color:#fff;border-bottom-color:#FF3366}
    .tab-content{display:none}
    .tab-content.active{display:block}
    .card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:28px;max-width:520px;margin:0 auto}
    .card h2{font-size:22px;margin-bottom:22px}
    .form-group{margin-bottom:18px}
    .form-label{display:block;margin-bottom:7px;font-size:14px;font-weight:600}
    .form-input{width:100%;padding:12px;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:10px;color:#fff;font-size:14px}
    .form-check{display:flex;align-items:start;gap:10px;font-size:13px;margin-bottom:16px}
    .form-hint{font-size:12px;color:#666;margin-top:5px}
    .btn-pink{width:100%;background:#FF3366;color:#fff;border:none;padding:13px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
    .btn-ghost{width:100%;background:#2a2a2a;color:#fff;border:1px solid #3a3a3a;padding:13px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px}
    .text-muted{text-align:center;margin-top:14px;font-size:14px;color:#999}
    .text-link{color:#FF3366;cursor:pointer}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px}
    .stat-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:18px}
    .stat-label{font-size:12px;color:#999;margin-bottom:6px}
    .stat-value{font-size:22px;font-weight:700}
    .deal-list{display:flex;flex-direction:column;gap:14px}
    .deal-item{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:18px;display:flex;justify-content:space-between;align-items:center;gap:12px}
    .deal-item-title{font-size:15px;font-weight:600}
    .deal-item-meta{font-size:13px;color:#999;margin-top:4px}
    .cats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:8px}
    .cat-check{display:flex;align-items:center;gap:8px;padding:10px;background:#2a2a2a;border-radius:8px;font-size:13px;cursor:pointer}
    .cat-check input{cursor:pointer}
    .validity-toggle{display:flex;gap:12px;margin-top:8px}
    .validity-opt{display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer}
    .single-date-fields{display:none;margin-top:14px;padding:14px;background:#2a2a2a;border-radius:10px}
    .recurring-fields{margin-top:14px}
    .weekdays{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .wd-btn{padding:7px 12px;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:8px;color:#fff;font-size:13px;cursor:pointer;user-select:none}
    .wd-btn.selected{background:#FF3366;border-color:#FF3366}
    .toast{position:fixed;top:20px;right:20px;padding:13px 20px;border-radius:11px;font-size:14px;font-weight:600;display:none;z-index:500;max-width:300px}
    .toast.show{display:block}
    .toast-ok{background:#fff;color:#000}
    .toast-err{background:#EF4444;color:#fff}
    .err-msg{color:#EF4444;font-size:13px;margin-bottom:12px;min-height:18px}
    #loginScreen,#registerScreen{padding:60px 20px}
    #barDashboard{display:none}
    .empty{color:#555;text-align:center;padding:40px;font-size:14px}
  </style>
</head>
<body>

<div id="toast" class="toast" role="alert"></div>

<div class="header">
  <div class="logo">🎫 BarSclusive – Bar-Portal</div>
  <button class="btn-logout" id="btnLogout" style="display:none">Ausloggen</button>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="container">
    <div class="tabs">
      <button class="tab active"data-auth-tab="login">Login</button>
      <button class="tab"data-auth-tab="register">Registrieren</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm" class="tab-content active">
      <div class="card">
        <h2>🔐 Bar Login</h2>
        <div class="err-msg" id="loginErr" aria-live="polite"></div>
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email</label>
          <input type="email" class="form-input" id="loginEmail" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Passwort</label>
          <input type="password" class="form-input" id="loginPassword" autocomplete="current-password">
        </div>
        <button class="btn-pink" id="btnBarLogin">Einloggen</button>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="tab-content">
      <div class="card">
        <h2>✨ Bar registrieren</h2>
        <div class="err-msg" id="regErr" aria-live="polite"></div>
        <div class="form-group">
          <label class="form-label" for="regBarName">Bar-Name *</label>
          <input type="text" class="form-input" id="regBarName">
        </div>
        <div class="form-group">
          <label class="form-label" for="regCity">Stadt *</label>
          <input type="text" class="form-input" id="regCity">
        </div>
        <div class="form-group">
          <label class="form-label" for="regAddress">Adresse</label>
          <input type="text" class="form-input" id="regAddress">
        </div>
        <div class="form-group">
          <label class="form-label" for="regPhone">Telefon</label>
          <input type="tel" class="form-input" id="regPhone">
        </div>
        <div class="form-group">
          <label class="form-label" for="regBarEmail">Email *</label>
          <input type="email" class="form-input" id="regBarEmail" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="regBarPass">Passwort (mind. 8 Zeichen) *</label>
          <input type="password" class="form-input" id="regBarPass" autocomplete="new-password">
        </div>
        <div class="form-check">
          <input type="checkbox" id="regConsent">
          <label for="regConsent">Ich akzeptiere die <a href="datenschutz.html" target="_blank" rel="noopener" style="color:#FF3366">Datenschutzerklärung</a></label>
        </div>
        <button class="btn-pink" id="btnBarRegister">Registrieren</button>
        <p style="margin-top:16px;font-size:13px;color:#999;text-align:center">
          Nach der Registrierung wird dein Account von BarSclusive freigeschaltet.
        </p>
      </div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="barDashboard">
  <div class="container">
    <div class="tabs">
      <button class="tab active" id="tabBtnDash"data-dash-tab="overview">📊 Übersicht</button>
      <button class="tab" id="tabBtnNew"data-dash-tab="newdeal">➕ Neuer Deal</button>
      <button class="tab" id="tabBtnDeals"data-dash-tab="mydeals">🎫 Meine Deals</button>
    </div>

    <!-- OVERVIEW -->
    <div id="dashOverview" class="tab-content active">
      <div class="stats-grid" id="statsGrid"></div>
      <div style="color:#999;font-size:14px">Eingeloggt als: <span id="barNameDisplay"></span></div>
    </div>

    <!-- NEW DEAL -->
    <div id="dashNewdeal" class="tab-content">
      <div class="card" style="max-width:700px">
        <h2>➕ Neuer Deal</h2>

        <div class="form-group">
          <label class="form-label" for="dealTitle">Titel *</label>
          <input type="text" class="form-input" id="dealTitle" placeholder="z.B. 2 Cocktails für 1">
        </div>

        <div class="form-group">
          <label class="form-label" for="dealDesc">Beschreibung</label>
          <input type="text" class="form-input" id="dealDesc" placeholder="Kurze Beschreibung">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div class="form-group">
            <label class="form-label" for="dealOrigPrice">Originalpreis (CHF)</label>
            <input type="number" class="form-input" id="dealOrigPrice" min="0" step="0.50">
          </div>
          <div class="form-group">
            <label class="form-label" for="dealPrice">Deal-Preis (CHF) *</label>
            <input type="number" class="form-input" id="dealPrice" min="0" step="0.50">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="dealQty">Max. Anzahl (0 = unbegrenzt)</label>
          <input type="number" class="form-input" id="dealQty" min="0" value="0">
        </div>

        <!-- CATEGORIES -->
        <div class="form-group">
          <label class="form-label">Kategorien * (mind. 1)</label>
          <div class="cats-grid">
            <label class="cat-check"><input type="checkbox" name="cat" value="breakfast"> 🥐 Breakfast</label>
            <label class="cat-check"><input type="checkbox" name="cat" value="lunch"> 🍽️ Lunch</label>
            <label class="cat-check"><input type="checkbox" name="cat" value="aperitif"> 🍹 Aperitif</label>
            <label class="cat-check"><input type="checkbox" name="cat" value="dinner"> 🍷 Dinner</label>
            <label class="cat-check"><input type="checkbox" name="cat" value="events"> 🎉 Events</label>
          </div>
        </div>

        <!-- VALIDITY TYPE -->
        <div class="form-group">
          <label class="form-label">Gültigkeitsdauer *</label>
          <div class="validity-toggle">
            <label class="validity-opt">
              <input type="radio" name="validType" value="recurring" checked onchange="toggleValidity()"> Wiederkehrend
            </label>
            <label class="validity-opt">
              <input type="radio" name="validType" value="single" onchange="toggleValidity()"> Einmaliges Datum
            </label>
          </div>

          <!-- RECURRING -->
          <div class="recurring-fields" id="recurringFields">
            <label class="form-label" style="margin-top:10px">Wochentage</label>
            <div class="weekdays" id="weekdays">
              <div class="wd-btn"data-weekday="Mo">Mo</div>
              <div class="wd-btn"data-weekday="Di">Di</div>
              <div class="wd-btn"data-weekday="Mi">Mi</div>
              <div class="wd-btn"data-weekday="Do">Do</div>
              <div class="wd-btn"data-weekday="Fr">Fr</div>
              <div class="wd-btn"data-weekday="Sa">Sa</div>
              <div class="wd-btn"data-weekday="So">So</div>
            </div>
          </div>

          <!-- SINGLE DATE -->
          <div class="single-date-fields" id="singleFields">
            <div class="form-group">
              <label class="form-label" for="singleDate">Datum</label>
              <input type="date" class="form-input" id="singleDate">
            </div>
          </div>

          <!-- TIME RANGE (both modes) -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px">
            <div class="form-group">
              <label class="form-label" for="timeFrom">Von</label>
              <input type="time" class="form-input" id="timeFrom">
            </div>
            <div class="form-group">
              <label class="form-label" for="timeTo">Bis</label>
              <input type="time" class="form-input" id="timeTo">
            </div>
          </div>
        </div>

        <div class="form-check">
          <input type="checkbox" id="dealActive" checked>
          <label for="dealActive">Deal sofort aktiv</label>
        </div>

        <button class="btn-pink" id="btnCreateDeal">Deal erstellen</button>
      </div>
    </div>

    <!-- MY DEALS -->
    <div id="dashMydeals" class="tab-content">
      <div class="deal-list" id="dealList"></div>
    </div>
  </div>
</div>

<script src="bar-app.js"></script>
</body>
</html>
