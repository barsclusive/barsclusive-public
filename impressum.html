function setLang(l){
  localStorage.setItem('barsclusive_lang',l);
  var t=T[l]||T.de;
  document.getElementById('content').innerHTML=t.body;
  document.getElementById('backLink').textContent=t.back;
  document.title=t.title+' \u2013 BarSclusive';
  document.getElementById('fShop').textContent=t.fShop;
  document.getElementById('fAbout').textContent=t.fAbout;
  document.getElementById('fPrivacy').textContent=t.fPrivacy;
  document.getElementById('fTerms').textContent=t.fTerms;
  document.getElementById('fContact').textContent=t.fContact;
  document.querySelectorAll('.lang-switch button').forEach(function(b){b.classList.remove('active');});
  var btn=document.getElementById('i'+l.toUpperCase());
  if(btn)btn.classList.add('active');
}
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.lang-switch button').forEach(function(btn){
    btn.addEventListener('click',function(){setLang(this.id.replace('i','').toLowerCase());});
  });
  setLang(localStorage.getItem('barsclusive_lang')||'de');
});
