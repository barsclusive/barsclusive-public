<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarSclusive Gutschein</title>
  <style>
    :root{--pink:#FF3366;--bg:#000;--card:#121212;--muted:#a1a1aa;--line:#2a2a2a;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:#fff;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif}
    .lang-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:18px 14px 0}
    .lang-bar button{background:#222;border:1px solid #333;color:#fff;padding:10px 14px;border-radius:14px;font-weight:700;cursor:pointer;min-width:54px}
    .lang-bar button.active{border-color:var(--pink);box-shadow:0 0 0 1px rgba(255,51,102,.25) inset}
    .wrap{max-width:760px;margin:0 auto;padding:18px 16px 40px}
    .voucher{background:linear-gradient(180deg,#161616,#101010);border:1px solid var(--line);border-radius:28px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.35)}
    .voucher-hero{padding:24px 22px 18px;border-bottom:1px solid var(--line);text-align:center}
    .voucher-hero img{height:54px;max-width:100%;object-fit:contain}
    .voucher-hero h1{margin:14px 0 6px;font-size:30px;line-height:1.1}
    .voucher-hero p{margin:0;color:var(--muted);font-size:15px}
    .voucher-image{display:none;height:220px;background:#1a1a1a;overflow:hidden}
    .voucher-image img{width:100%;height:100%;object-fit:cover}
    .voucher-body{padding:22px}
    .voucher-field{background:#171717;border:1px solid var(--line);border-radius:18px;padding:16px 18px;margin-bottom:14px}
    .label{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .value{font-size:17px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
    .value.status-valid{color:var(--ok);font-weight:700}
    .value.status-redeemed{color:var(--warn);font-weight:700}
    .value.status-expired,.value.status-refunded{color:var(--bad);font-weight:700}
    .voucher-code{background:#0e0e0e;border:1px dashed #4b4b4b;border-radius:22px;padding:18px;text-align:center;margin:18px 0 10px}
    .voucher-code .code{font-size:34px;line-height:1;font-weight:900;letter-spacing:.08em;color:var(--pink);word-break:break-word}
    .voucher-code .hint{margin-top:10px;color:var(--muted);font-size:13px}
    .qr-wrap{display:flex;justify-content:center;margin:18px 0}
    .qr-wrap img{width:170px;height:170px;border-radius:16px;background:#fff;padding:10px}
    .share-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:16px 0 8px}
    .share-btn{background:#202020;color:#fff;border:1px solid #333;padding:10px 16px;border-radius:999px;font-size:14px;cursor:pointer}
    .voucher-info,.voucher-legal{color:var(--muted);font-size:13px;line-height:1.65;text-align:center;margin-top:14px}
    .loading,.error{padding:80px 18px;text-align:center;color:var(--muted)}
    .error{display:none}
    .back-link{display:inline-block;margin-top:14px;color:var(--pink);text-decoration:none}
    .footer{text-align:center;color:#8b8b92;font-size:13px;padding:28px 16px 10px}
    .footer a{color:var(--pink);text-decoration:none;margin:0 8px}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#222;color:#fff;border:1px solid #333;padding:12px 18px;border-radius:12px;font-size:14px;z-index:9999;display:none}
    .discount-badge{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,51,102,.14);border:1px solid rgba(255,51,102,.35);color:#fff;border-radius:999px;padding:8px 14px;font-size:15px;font-weight:800;margin-bottom:14px}
    @media (max-width:640px){
      .voucher-hero h1{font-size:24px}
      .voucher-code .code{font-size:26px}
      .voucher-body{padding:16px}
      .voucher-field{padding:14px}
      .voucher-image{height:180px}
    }
  </style>
</head>
<body>
  <div class="lang-bar">
    <button id="langDe" type="button">DE</button>
    <button id="langEn" type="button">EN</button>
    <button id="langIt" type="button">IT</button>
    <button id="langFr" type="button">FR</button>
  </div>

  <div class="wrap">
    <div class="voucher" id="voucherCard" style="display:none">
      <div class="voucher-hero">
        <img src="logo.png" alt="BarSclusive" onerror="this.style.display='none'">
        <h1 data-i18n="headerTitle">Dein Gutschein</h1>
        <p id="vBarName"></p>
      </div>
      <div class="voucher-image" id="voucherImageWrap"><img id="voucherImage" alt="Deal Bild"></div>
      <div class="voucher-body">
        <div id="vDiscountBadge" style="text-align:center;display:none"><div class="discount-badge" id="vDiscount"></div></div>

        <div class="voucher-field">
          <div class="label" data-i18n="lDeal">Deal</div>
          <div class="value" id="vDealTitle"></div>
        </div>

        <div class="voucher-field" id="vDescWrap" style="display:none">
          <div class="label" data-i18n="lDesc">Beschreibung</div>
          <div class="value" id="vDesc"></div>
        </div>

        <div class="voucher-field" id="vValidityWrap" style="display:none">
          <div class="label" data-i18n="lValidity">Gültigkeit</div>
          <div class="value" id="vValidity"></div>
        </div>

        <div class="voucher-field" id="vMinOrderWrap" style="display:none">
          <div class="label" data-i18n="lMin">Mindestbestellung</div>
          <div class="value" id="vMinOrder"></div>
        </div>

        <div class="voucher-field" id="vAppliesToWrap" style="display:none">
          <div class="label" data-i18n="lApplies">Gilt für</div>
          <div class="value" id="vAppliesTo"></div>
        </div>

        <div class="voucher-field">
          <div class="label" data-i18n="lPaid">Bezahlt</div>
          <div class="value" id="vPrice"></div>
        </div>

        <div class="voucher-field" id="vStatusWrap">
          <div class="label" data-i18n="lStatus">Status</div>
          <div class="value" id="vStatus"></div>
        </div>

        <div class="voucher-code">
          <div class="code" id="vCode"></div>
          <div class="hint" data-i18n="hint">Zeige diesen Code in der Bar vor</div>
        </div>

        <div class="qr-wrap" id="qrCode"></div>
        <div class="share-row" id="shareRow"></div>
        <div class="voucher-info" id="voucherInfo"></div>
        <div class="voucher-legal" id="voucherLegal"></div>
      </div>
    </div>

    <div class="loading" id="loadingState">
      <p data-i18n="loading">Gutschein wird geladen...</p>
    </div>

    <div class="error" id="errorState">
      <div style="font-size:40px">❌</div>
      <p id="errorMsg">Gutschein nicht gefunden</p>
      <a href="shop.html" class="back-link" id="backLink" data-i18n="backShop">← Zurück zum Shop</a>
    </div>

    <div class="footer">
      <p>&copy; 2026 BarSclusive</p>
      <p style="margin-top:12px">
        <a href="shop.html" id="fShop">Shop</a>
        <a href="ueber-uns.html" id="fAbout">Über uns</a>
        <a href="kontakt.html" id="fContact">Kontakt</a>
      </p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbz1zkTHlVpnFgbMlscbjgGHXDRwhoAqYQeasInpWUDzn6dzC2aFC_DEykj_itklCHILRA/exec';
    let currentLang = new URLSearchParams(window.location.search).get('lang') || localStorage.getItem('barsclusive_lang') || 'de';
    let currentVoucher = null;

    const T = {
      de:{
        title:'BarSclusive Gutschein', headerTitle:'Dein Gutschein', lDeal:'Deal', lDesc:'Beschreibung', lValidity:'Gültigkeit', lMin:'Mindestbestellung', lApplies:'Gilt für', lPaid:'Bezahlt', lStatus:'Status',
        hint:'Zeige diesen Code in der Bar vor', loading:'Gutschein wird geladen...', notFound:'Gutschein nicht gefunden', errorNoCode:'Kein Gutschein-Code angegeben.', errorConn:'Verbindungsfehler. Bitte erneut versuchen.',
        backShop:'← Zurück zum Shop', infoText:'Zeige diesen Gutschein dem Personal in der Bar. Der Code kann gescannt oder manuell eingegeben werden.', shareNative:'Teilen', shareCopy:'Link kopieren', toastCopied:'Link kopiert!',
        appliesAll:'Alles', appliesDrinks:'Nur Getränke', appliesFood:'Nur Essen', statusIssued:'Gültig ✅', statusSent:'Gültig ✅', statusRedeemed:'Eingelöst ⚠️', statusExpired:'Abgelaufen ❌', statusRefunded:'Erstattet ❌',
        legalBar:'Die Leistung wird vor Ort durch die Partnerbar erbracht. Es gelten die Angaben auf diesem Gutschein.', legalDiscount:'Der Rabatt wird direkt in der Partnerbar eingelöst. Es gelten die Angaben auf diesem Gutschein.',
        validRecurring:'Wiederkehrend gemäss den untenstehenden Bedingungen', validSingleOn:'Gültig am', validWeekdays:'Wochentage', validHours:'Uhrzeit', validTimeSlots:'Zeitfenster',
        slotMorning:'Morgen (06–12h)', slotMidday:'Mittag (11–17h)', slotEvening:'Abend (16–00h)', fShop:'Shop', fAbout:'Über uns', fContact:'Kontakt'
      },
      en:{
        title:'BarSclusive Voucher', headerTitle:'Your voucher', lDeal:'Deal', lDesc:'Description', lValidity:'Validity', lMin:'Minimum order', lApplies:'Applies to', lPaid:'Paid', lStatus:'Status',
        hint:'Show this code at the bar', loading:'Loading voucher...', notFound:'Voucher not found', errorNoCode:'No voucher code provided.', errorConn:'Connection error. Please try again.',
        backShop:'← Back to shop', infoText:'Show this voucher to the staff at the bar. The code can be scanned or entered manually.', shareNative:'Share', shareCopy:'Copy link', toastCopied:'Link copied!',
        appliesAll:'Everything', appliesDrinks:'Drinks only', appliesFood:'Food only', statusIssued:'Valid ✅', statusSent:'Valid ✅', statusRedeemed:'Redeemed ⚠️', statusExpired:'Expired ❌', statusRefunded:'Refunded ❌',
        legalBar:'The service is provided on site by the partner bar. The details shown on this voucher apply.', legalDiscount:'The discount is redeemed directly at the partner bar. The details shown on this voucher apply.',
        validRecurring:'Recurring according to the conditions below', validSingleOn:'Valid on', validWeekdays:'Weekdays', validHours:'Time', validTimeSlots:'Time slots',
        slotMorning:'Morning (06–12)', slotMidday:'Midday (11–17)', slotEvening:'Evening (16–00)', fShop:'Shop', fAbout:'About us', fContact:'Contact'
      },
      it:{
        title:'Voucher BarSclusive', headerTitle:'Il tuo voucher', lDeal:'Deal', lDesc:'Descrizione', lValidity:'Validità', lMin:'Ordine minimo', lApplies:'Valido per', lPaid:'Pagato', lStatus:'Stato',
        hint:'Mostra questo codice al bar', loading:'Caricamento voucher...', notFound:'Voucher non trovato', errorNoCode:'Nessun codice voucher indicato.', errorConn:'Errore di connessione. Riprova.',
        backShop:'← Torna allo shop', infoText:'Mostra questo voucher al personale del bar. Il codice può essere scansionato o inserito manualmente.', shareNative:'Condividi', shareCopy:'Copia link', toastCopied:'Link copiato!',
        appliesAll:'Tutto', appliesDrinks:'Solo bevande', appliesFood:'Solo cibo', statusIssued:'Valido ✅', statusSent:'Valido ✅', statusRedeemed:'Riscattato ⚠️', statusExpired:'Scaduto ❌', statusRefunded:'Rimborsato ❌',
        legalBar:'La prestazione viene fornita sul posto dal bar partner. Fanno stato le indicazioni riportate su questo voucher.', legalDiscount:'Lo sconto viene riscattato direttamente nel bar partner. Fanno stato le indicazioni riportate su questo voucher.',
        validRecurring:'Ricorrente secondo le condizioni sotto indicate', validSingleOn:'Valido il', validWeekdays:'Giorni', validHours:'Orario', validTimeSlots:'Fasce orarie',
        slotMorning:'Mattina (06–12)', slotMidday:'Pranzo (11–17)', slotEvening:'Sera (16–00)', fShop:'Shop', fAbout:'Chi siamo', fContact:'Contatto'
      },
      fr:{
        title:'Bon BarSclusive', headerTitle:'Votre bon', lDeal:'Deal', lDesc:'Description', lValidity:'Validité', lMin:'Commande minimale', lApplies:'Valable pour', lPaid:'Payé', lStatus:'Statut',
        hint:'Présentez ce code au bar', loading:'Chargement du bon...', notFound:'Bon introuvable', errorNoCode:'Aucun code de bon fourni.', errorConn:'Erreur de connexion. Veuillez réessayer.',
        backShop:'← Retour à la boutique', infoText:'Présentez ce bon au personnel du bar. Le code peut être scanné ou saisi manuellement.', shareNative:'Partager', shareCopy:'Copier le lien', toastCopied:'Lien copié !',
        appliesAll:'Tout', appliesDrinks:'Boissons uniquement', appliesFood:'Nourriture uniquement', statusIssued:'Valide ✅', statusSent:'Valide ✅', statusRedeemed:'Utilisé ⚠️', statusExpired:'Expiré ❌', statusRefunded:'Remboursé ❌',
        legalBar:'La prestation est fournie sur place par le bar partenaire. Les informations affichées sur ce bon font foi.', legalDiscount:'La réduction est utilisée directement dans le bar partenaire. Les informations affichées sur ce bon font foi.',
        validRecurring:'Récurrent selon les conditions ci-dessous', validSingleOn:'Valable le', validWeekdays:'Jours', validHours:'Horaire', validTimeSlots:'Créneaux horaires',
        slotMorning:'Matin (06–12)', slotMidday:'Midi (11–17)', slotEvening:'Soir (16–00)', fShop:'Shop', fAbout:'À propos', fContact:'Contact'
      }
    };

    function tt(key){ return (T[currentLang] && T[currentLang][key]) || (T.de && T.de[key]) || key; }

    function showToast(msg){
      const t = document.getElementById('toast');
      if (!t) return;
      t.textContent = msg;
      t.style.display = 'block';
      clearTimeout(showToast._tmr);
      showToast._tmr = setTimeout(function(){ t.style.display = 'none'; }, 2200);
    }

    function setLang(lang){
      currentLang = (T[lang] ? lang : 'de');
      localStorage.setItem('barsclusive_lang', currentLang);
      document.documentElement.lang = currentLang;
      document.title = tt('title');
      document.querySelectorAll('[data-i18n]').forEach(function(el){
        const key = el.getAttribute('data-i18n');
        if (tt(key)) el.textContent = tt(key);
      });
      document.getElementById('langDe').classList.toggle('active', currentLang === 'de');
      document.getElementById('langEn').classList.toggle('active', currentLang === 'en');
      document.getElementById('langIt').classList.toggle('active', currentLang === 'it');
      document.getElementById('langFr').classList.toggle('active', currentLang === 'fr');
      document.getElementById('fShop').textContent = tt('fShop');
      document.getElementById('fAbout').textContent = tt('fAbout');
      document.getElementById('fContact').textContent = tt('fContact');
      if (currentVoucher) renderVoucher(currentVoucher);
    }

    function showError(msgKey, raw){
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('voucherCard').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('errorMsg').textContent = raw ? msgKey : tt(msgKey);
    }

    function getAppliesLabel(val){
      if (val === 'drinks') return tt('appliesDrinks');
      if (val === 'food') return tt('appliesFood');
      return tt('appliesAll');
    }

    function getStatusLabel(status){
      return tt('status' + String(status || '').charAt(0).toUpperCase() + String(status || '').slice(1)) || status;
    }

    function getStatusClass(status){
      return status === 'redeemed' ? 'status-redeemed' : status === 'expired' ? 'status-expired' : status === 'refunded' ? 'status-refunded' : 'status-valid';
    }

    function parseArray(value){
      if (Array.isArray(value)) return value;
      if (!value) return [];
      try { const parsed = JSON.parse(value); return Array.isArray(parsed) ? parsed : []; } catch(e) { return []; }
    }

    function weekdayLabel(day){
      const map = {
        de:{Mo:'Mo',Di:'Di',Mi:'Mi',Do:'Do',Fr:'Fr',Sa:'Sa',So:'So'},
        en:{Mo:'Mon',Di:'Tue',Mi:'Wed',Do:'Thu',Fr:'Fri',Sa:'Sat',So:'Sun'},
        it:{Mo:'Lun',Di:'Mar',Mi:'Mer',Do:'Gio',Fr:'Ven',Sa:'Sab',So:'Dom'},
        fr:{Mo:'Lun',Di:'Mar',Mi:'Mer',Do:'Jeu',Fr:'Ven',Sa:'Sam',So:'Dim'}
      };
      return (map[currentLang] && map[currentLang][day]) || day;
    }

    function slotLabel(slot){
      return slot === 'morning' ? tt('slotMorning') : slot === 'midday' ? tt('slotMidday') : slot === 'evening' ? tt('slotEvening') : slot;
    }

    function formatDateLocal(isoDate){
      if (!isoDate) return '';
      const d = new Date(isoDate.length <= 10 ? (isoDate + 'T12:00:00') : isoDate);
      if (isNaN(d.getTime())) return isoDate;
      return d.toLocaleDateString(currentLang === 'en' ? 'en-GB' : currentLang === 'it' ? 'it-IT' : currentLang === 'fr' ? 'fr-FR' : 'de-CH');
    }

    function formatValidity(v){
      const type = String(v.validity_type || 'recurring');
      const weekdays = parseArray(v.valid_weekdays);
      const slots = parseArray(v.time_slots);
      const parts = [];
      if (type === 'single' && v.valid_single_date) {
        parts.push(tt('validSingleOn') + ' ' + formatDateLocal(v.valid_single_date));
      } else {
        if (weekdays.length) parts.push(tt('validWeekdays') + ': ' + weekdays.map(weekdayLabel).join(', '));
        else parts.push(tt('validRecurring'));
      }
      if (slots.length) parts.push(tt('validTimeSlots') + ': ' + slots.map(slotLabel).join(', '));
      if (v.valid_from_time || v.valid_to_time) {
        const from = v.valid_from_time || '–';
        const to = v.valid_to_time || '–';
        parts.push(tt('validHours') + ': ' + from + '–' + to);
      }
      return parts.filter(Boolean).join(' · ');
    }

    function renderVoucher(v){
      currentVoucher = v;
      document.getElementById('vBarName').textContent = v.bar_name || '';
      document.getElementById('vDealTitle').textContent = v.deal_title || '';
      document.getElementById('vPrice').textContent = Number(v.price_paid || 0).toFixed(2) + ' CHF';
      document.getElementById('vCode').textContent = v.code || '';
      document.getElementById('voucherInfo').textContent = tt('infoText');

      const isDiscountProduct = Number(v.discount_percent || 0) > 0 || Number(v.price_paid || 0) <= 2.50;
      document.getElementById('voucherLegal').textContent = isDiscountProduct ? tt('legalDiscount') : tt('legalBar');

      const imageWrap = document.getElementById('voucherImageWrap');
      const imageEl = document.getElementById('voucherImage');
      if (v.image_url) {
        imageEl.src = v.image_url;
        imageEl.referrerPolicy = 'no-referrer';
        imageWrap.style.display = 'block';
      } else {
        imageEl.removeAttribute('src');
        imageWrap.style.display = 'none';
      }

      const descWrap = document.getElementById('vDescWrap');
      const desc = String(v.description || '').trim();
      if (desc) {
        document.getElementById('vDesc').textContent = desc;
        descWrap.style.display = 'block';
      } else {
        descWrap.style.display = 'none';
      }

      const validityWrap = document.getElementById('vValidityWrap');
      const validityText = formatValidity(v);
      if (validityText) {
        document.getElementById('vValidity').textContent = validityText;
        validityWrap.style.display = 'block';
      } else {
        validityWrap.style.display = 'none';
      }

      const statusEl = document.getElementById('vStatus');
      statusEl.textContent = getStatusLabel(v.status);
      statusEl.className = 'value ' + getStatusClass(v.status);

      const discountWrap = document.getElementById('vDiscountBadge');
      discountWrap.style.display = 'none';
      if (Number(v.discount_percent || 0) > 0) {
        discountWrap.style.display = 'block';
        document.getElementById('vDiscount').textContent = '-' + Number(v.discount_percent) + '%';
      }

      const minWrap = document.getElementById('vMinOrderWrap');
      minWrap.style.display = 'none';
      if (Number(v.min_order || 0) > 0) {
        minWrap.style.display = 'block';
        document.getElementById('vMinOrder').textContent = Number(v.min_order).toFixed(2) + ' CHF';
      }

      const appliesWrap = document.getElementById('vAppliesToWrap');
      appliesWrap.style.display = 'none';
      if (v.applies_to && v.applies_to !== 'all') {
        appliesWrap.style.display = 'block';
        document.getElementById('vAppliesTo').textContent = getAppliesLabel(v.applies_to);
      }

      const qrEl = document.getElementById('qrCode');
      qrEl.innerHTML = '';
      if (v.code) {
        const img = document.createElement('img');
        img.alt = 'QR';
        img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(v.code);
        qrEl.appendChild(img);
      }

      const shareRow = document.getElementById('shareRow');
      shareRow.innerHTML = '';
      if (navigator.share) {
        const nativeBtn = document.createElement('button');
        nativeBtn.type = 'button';
        nativeBtn.className = 'share-btn';
        nativeBtn.textContent = tt('shareNative');
        nativeBtn.onclick = function(){ navigator.share({ title: document.title, text: (v.deal_title || 'BarSclusive'), url: window.location.href }).catch(function(){}); };
        shareRow.appendChild(nativeBtn);
      }
      const copyBtn = document.createElement('button');
      copyBtn.type = 'button';
      copyBtn.className = 'share-btn';
      copyBtn.textContent = tt('shareCopy');
      copyBtn.onclick = function(){ navigator.clipboard.writeText(window.location.href).then(function(){ showToast(tt('toastCopied')); }).catch(function(){ showToast(window.location.href); }); };
      shareRow.appendChild(copyBtn);
    }

    async function loadVoucher(){
      const params = new URLSearchParams(window.location.search);
      const code = (params.get('code') || params.get('voucher') || '').trim();
      if (!code) { showError('errorNoCode'); return; }
      try {
        const resp = await fetch(BACKEND_URL + '?action=getVoucherByCode&code=' + encodeURIComponent(code));
        const data = await resp.json();
        if (!data.success || !data.voucher) {
          showError(data.error || tt('notFound'), !!data.error);
          return;
        }
        renderVoucher(data.voucher);
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('voucherCard').style.display = 'block';
      } catch (e) {
        showError('errorConn');
      }
    }

    document.getElementById('langDe').addEventListener('click', function(){ setLang('de'); });
    document.getElementById('langEn').addEventListener('click', function(){ setLang('en'); });
    document.getElementById('langIt').addEventListener('click', function(){ setLang('it'); });
    document.getElementById('langFr').addEventListener('click', function(){ setLang('fr'); });

    setLang(currentLang);
    loadVoucher();
  </script>
</body>
</html>
