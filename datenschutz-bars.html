    const LEGAL_META = {
  "de": {
    "title": "Datenschutzerklärung für Bars",

    "back": "← Zurück zum Portal"
  },
  "en": {

  "it": {

    "subtitle": "BarSclusive | Version : mars 2026",
    "back": "← Retour au portail"
  }
};
    const LEGAL_STORAGE_KEY = "barsclusive_bar_lang";
    function setLegalLang(lang) {
      var current = LEGAL_META[lang] ? lang : "de";
      var meta = LEGAL_META[current];
      var tpl = document.getElementById("legal-body-" + current);
      document.documentElement.lang = current;
      document.title = meta.title + " - BarSclusive";
      document.getElementById("pageTitle").textContent = meta.title;
      document.getElementById("pageSubtitle").textContent = meta.subtitle;
      document.getElementById("backBtn").textContent = meta.back;
      document.getElementById("legalBody").innerHTML = tpl ? tpl.innerHTML : document.getElementById("legal-body-de").innerHTML;
      document.querySelectorAll(".lang-btn").forEach(function(btn){ btn.classList.toggle("active", btn.dataset.lang === current); });
      try { localStorage.setItem(LEGAL_STORAGE_KEY, current); } catch(e) {}
    }
    document.querySelectorAll(".lang-btn").forEach(function(btn){
      btn.addEventListener("click", function(){ setLegalLang(btn.dataset.lang); });
    });
    var initialLang = "de";
    try { initialLang = localStorage.getItem(LEGAL_STORAGE_KEY) || "de"; } catch(e) {}
    setLegalLang(initialLang);
  </script>
